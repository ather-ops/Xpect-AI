<svg width="100%" viewBox="0 0 680 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Xpect AI — MVP architecture</title>
<defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .th  { font-size:14px; font-weight:600; }
    .ts  { font-size:12px; font-weight:400; }
    .day { font-size:10px; font-weight:500; fill:#6e7781; font-family:'SFMono-Regular',monospace; }
  </style>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#8c959f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <!-- Grid pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8ecf0" stroke-width="0.5"/>
  </pattern>
</defs>

<!-- card background -->
<rect x="12" y="12" width="656" height="916" rx="14" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>

<!-- grid lines inside card -->
<clipPath id="cardClip">
  <rect x="12" y="60" width="656" height="868" rx="0"/>
</clipPath>
<rect x="12" y="60" width="656" height="868" fill="url(#grid)" clip-path="url(#cardClip)"/>

<!-- header -->
<rect x="12" y="12" width="656" height="48" rx="14" fill="#f6f8fa"/>
<rect x="12" y="40" width="656" height="20" fill="#f6f8fa"/>
<rect x="12" y="56" width="656" height="4" fill="#ffffff"/>
<line x1="12" y1="60" x2="668" y2="60" stroke="#d0d7de" stroke-width="0.5"/>
<circle cx="40" cy="36" r="6" fill="#ff5f57"/>
<circle cx="60" cy="36" r="6" fill="#febc2e"/>
<circle cx="80" cy="36" r="6" fill="#28c840"/>
<text x="340" y="40" text-anchor="middle" font-family="monospace" font-size="11" fill="#6e7781">Xpect AI — MVP pipeline architecture</text>

<!-- STAGE 1: raw CSV -->
<text x="38" y="100" text-anchor="middle" class="day">INPUT</text>
<rect x="190" y="82" width="300" height="44" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="0.5"/>
<text x="340" y="99" text-anchor="middle" dominant-baseline="central" class="th" fill="#1f2328">netflix_titles.csv</text>
<text x="340" y="117" text-anchor="middle" dominant-baseline="central" class="ts" fill="#6e7781">8,800+ titles — raw source</text>
<line x1="340" y1="126" x2="340" y2="152" stroke="#8c959f" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STAGE 2: clean + EDA -->
<text x="38" y="182" text-anchor="middle" class="day">pipeline.py</text>
<rect x="170" y="154" width="340" height="52" rx="8" fill="#dafbe1" stroke="#2da44e" stroke-width="0.5"/>
<text x="340" y="174" text-anchor="middle" dominant-baseline="central" class="th" fill="#1a7f37">Data cleaning and EDA</text>
<text x="340" y="194" text-anchor="middle" dominant-baseline="central" class="ts" fill="#2da44e">Null handling, normalization, 5 chart exports to 04-Visuals/</text>
<line x1="340" y1="206" x2="340" y2="232" stroke="#8c959f" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STAGE 3: feature engineering -->
<text x="38" y="260" text-anchor="middle" class="day">pipeline.py</text>
<rect x="170" y="234" width="340" height="52" rx="8" fill="#dafbe1" stroke="#2da44e" stroke-width="0.5"/>
<text x="340" y="254" text-anchor="middle" dominant-baseline="central" class="th" fill="#1a7f37">Feature engineering</text>
<text x="340" y="274" text-anchor="middle" dominant-baseline="central" class="ts" fill="#2da44e">title + director + cast + genres + description → combined text</text>
<line x1="340" y1="286" x2="340" y2="312" stroke="#8c959f" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STAGE 4: chunking -->
<text x="38" y="345" text-anchor="middle" class="day">pipeline.py</text>
<rect x="150" y="314" width="380" height="60" rx="8" fill="#dcffe4" stroke="#2da44e" stroke-width="0.8"/>
<text x="340" y="337" text-anchor="middle" dominant-baseline="central" class="th" fill="#116329">Sentence-level chunking</text>
<text x="340" y="357" text-anchor="middle" dominant-baseline="central" class="ts" fill="#2da44e">NLTK sent_tokenize — 2 sentences/chunk — show_id_chunk_N IDs</text>
<line x1="340" y1="374" x2="340" y2="400" stroke="#8c959f" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STAGE 5: embeddings -->
<text x="38" y="428" text-anchor="middle" class="day">pipeline.py</text>
<rect x="170" y="402" width="340" height="52" rx="8" fill="#ebe8ff" stroke="#6e40c9" stroke-width="0.5"/>
<text x="340" y="422" text-anchor="middle" dominant-baseline="central" class="th" fill="#512a97">Embedding generation</text>
<text x="340" y="442" text-anchor="middle" dominant-baseline="central" class="ts" fill="#6e40c9">all-MiniLM-L6-v2 — 384-dim dense vectors per chunk</text>
<line x1="340" y1="454" x2="340" y2="480" stroke="#8c959f" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STAGE 6: ChromaDB persist -->
<text x="38" y="510" text-anchor="middle" class="day">pipeline.py</text>
<rect x="170" y="482" width="340" height="52" rx="8" fill="#ebe8ff" stroke="#6e40c9" stroke-width="0.8"/>
<text x="340" y="502" text-anchor="middle" dominant-baseline="central" class="th" fill="#512a97">ChromaDB — PersistentClient</text>
<text x="340" y="522" text-anchor="middle" dominant-baseline="central" class="ts" fill="#6e40c9">Persisted to chroma_data/ — survives restarts</text>
<line x1="340" y1="534" x2="340" y2="560" stroke="#8c959f" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STAGE 7: retrieval -->
<text x="38" y="592" text-anchor="middle" class="day">rag_engine.py</text>
<rect x="150" y="562" width="380" height="52" rx="8" fill="#ffebe9" stroke="#cf222e" stroke-width="0.5"/>
<text x="340" y="582" text-anchor="middle" dominant-baseline="central" class="th" fill="#a40e26">Semantic retrieval</text>
<text x="340" y="602" text-anchor="middle" dominant-baseline="central" class="ts" fill="#cf222e">Query vector + $and filters: genre, year, rating, type</text>
<line x1="340" y1="614" x2="340" y2="640" stroke="#8c959f" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STAGE 8: Gemini LLM -->
<text x="38" y="678" text-anchor="middle" class="day">rag_engine.py</text>
<rect x="148" y="642" width="384" height="68" rx="8" fill="#fbefff" stroke="#8250df" stroke-width="1.2"/>
<text x="340" y="666" text-anchor="middle" dominant-baseline="central" class="th" fill="#6639ba">Gemini 2.5 Flash — LLM answer generation</text>
<text x="340" y="686" text-anchor="middle" dominant-baseline="central" class="ts" fill="#8250df">Grounded prompt — top-3 recommendations with reasoning</text>
<text x="340" y="702" text-anchor="middle" dominant-baseline="central" class="ts" fill="#8250df">Cannot hallucinate — context locked to retrieved chunks</text>
<line x1="340" y1="710" x2="340" y2="736" stroke="#8c959f" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STAGE 9: Streamlit UI LIVE -->
<text x="38" y="766" text-anchor="middle" class="day">app.py</text>
<rect x="148" y="738" width="384" height="60" rx="8" fill="#dafbe1" stroke="#2da44e" stroke-width="1.5"/>
<text x="320" y="761" text-anchor="middle" dominant-baseline="central" class="th" fill="#116329">Streamlit UI — MVP Live</text>
<text x="320" y="781" text-anchor="middle" dominant-baseline="central" class="ts" fill="#2da44e">xpect-ai-v1.streamlit.app</text>
<!-- LIVE pill -->
<rect x="502" y="748" width="42" height="18" rx="9" fill="#2da44e"/>
<text x="523" y="759" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#ffffff">LIVE</text>

<!-- legend -->
<line x1="80" y1="820" x2="600" y2="820" stroke="#d0d7de" stroke-width="0.5"/>
<rect x="88"  y="830" width="10" height="10" rx="2" fill="#dafbe1" stroke="#2da44e"  stroke-width="0.5"/>
<text x="104" y="839" font-family="sans-serif" font-size="11" fill="#6e7781">Data / EDA</text>
<rect x="192" y="830" width="10" height="10" rx="2" fill="#dcffe4" stroke="#2da44e"  stroke-width="0.5"/>
<text x="208" y="839" font-family="sans-serif" font-size="11" fill="#6e7781">Chunking</text>
<rect x="292" y="830" width="10" height="10" rx="2" fill="#ebe8ff" stroke="#6e40c9"  stroke-width="0.5"/>
<text x="308" y="839" font-family="sans-serif" font-size="11" fill="#6e7781">ML / Vector</text>
<rect x="408" y="830" width="10" height="10" rx="2" fill="#ffebe9" stroke="#cf222e"  stroke-width="0.5"/>
<text x="424" y="839" font-family="sans-serif" font-size="11" fill="#6e7781">Retrieval</text>
<rect x="508" y="830" width="10" height="10" rx="2" fill="#fbefff" stroke="#8250df"  stroke-width="0.5"/>
<text x="524" y="839" font-family="sans-serif" font-size="11" fill="#6e7781">LLM</text>

<text x="340" y="880" text-anchor="middle" font-family="monospace" font-size="11" fill="#8c959f">github.com/ather-ops/Xpect-AI</text>
<text x="340" y="900" text-anchor="middle" font-family="monospace" font-size="11" fill="#8c959f">xpect-ai-v1.streamlit.app</text>
</svg>
